[RESEAU]
; Probabilité qu'un envoi réussisse (1.0 = aucune perte, 0.7 = 30% de perte)
fiabilite = 0.95
; Proportion des segments reçus qui sont corrompus
taux_corruption = 0.02
; Délai d'attente en secondes avant retransmission
timeout = 0.5
; Nombre maximal de tentatives consécutives avant abandon
max_reprises = 10

[CONNEXION]
; Taille maximale des données utiles proposée par le client (en octets)
client_mss_propose = 1024
; Taille maximale des données utiles proposée par le serveur (en octets)
serveur_mss_propose = 1024
; Taille de fenêtre proposée (nb de segments envoyés avant attente d'un ACK)
n_propose = 4

[SERVEUR]
; Adresse et port d'écoute du serveur
hote = 127.0.0.1
port = 4242
